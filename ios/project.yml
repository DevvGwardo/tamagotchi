name: Tamagotchi
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_ENTITLEMENTS: ""

targets:
  Tamagotchi:
    type: application
    platform: iOS
    sources:
      - path: Tamagotchi/Sources
    resources:
      - path: Tamagotchi/Resources
    settings:
      base:
        INFOPLIST_FILE: Tamagotchi/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.tamagotchi
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
    dependencies:
      - target: TamagotchiWatch
        embed: true

  TamagotchiWatch:
    type: application
    platform: watchOS
    sources:
      - path: Tamagotchi/Sources
    resources:
      - path: Tamagotchi/Resources
    settings:
      base:
        INFOPLIST_FILE: Tamagotchi/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.tamagotchi.watchkitapp
        WATCHOS_DEPLOYMENT_TARGET: "9.0"
        SDKROOT: watchos
        TARGETED_DEVICE_FAMILY: 4
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.openclaw.tamagotchi

schemes:
  Tamagotchi:
    build:
      targets:
        Tamagotchi: all
        TamagotchiWatch: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

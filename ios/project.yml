name: Tamagotchi
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "16.0"
    watchOS: "26.2"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  # ── iOS Companion App ──────────────────────────────────────────
  Tamagotchi-iOS:
    type: application
    platform: iOS
    sources:
      - path: iOS/Tamagotchi/Sources
    resources:
      - path: iOS/Tamagotchi/Resources
    settings:
      base:
        INFOPLIST_FILE: iOS/Tamagotchi/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.tamagotchi
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: Tamagotchi-Watch
        embed: true
        codeSign: false

  # ── watchOS WatchKit App ────────────────────────────────────────
  Tamagotchi-Watch:
    type: application
    platform: watchOS
    sources:
      - path: watch/Tamagotchi/Sources
    resources:
      - path: watch/Tamagotchi/Resources
    settings:
      base:
        INFOPLIST_FILE: watch/Tamagotchi/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.tamagotchi.watchkitapp
        WATCHOS_DEPLOYMENT_TARGET: "26.2"
        SDKROOT: watchos
        TARGETED_DEVICE_FAMILY: 4
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ""
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES

schemes:
  Tamagotchi-iOS:
    build:
      targets:
        Tamagotchi-iOS: all
        Tamagotchi-Watch: all
    run:
      config: Debug
    archive:
      config: Release
